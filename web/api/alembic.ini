# Alembic Configuration - Water Treatment Controller
#
# Database migrations for SQLAlchemy models.
# Run with: alembic upgrade head

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path prepend for loading app modules
prepend_sys_path = .

# timezone for file generation
timezone = UTC

# max length of characters to apply to the "slug" field
truncate_slug_length = 40

# set to 'true' to run environment when generating autogenerated revisions
revision_environment = false

# set to 'true' to allow .pyc and .pyo files without a source .py file
sourceless = false

# version path separator - default is os dependent
version_path_separator = os

# output_encoding used for migration files
output_encoding = utf-8

# Database URL - uses environment variable or falls back to SQLite
# In production, set DATABASE_URL environment variable
sqlalchemy.url = sqlite:///./water_controller.db


[post_write_hooks]
# Lint new migration files with ruff
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
